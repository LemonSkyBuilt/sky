name: CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  cpp-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show C++ toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure CMake
        run: cmake -S cpp-services -B build/cpp -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ services
        run: cmake --build build/cpp --parallel

      - name: Run C++ tests
        run: ctest --test-dir build/cpp --output-on-failure

      - name: Upload C++ binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-binaries
          path: build/cpp/bin/*
          if-no-files-found: warn

      - name: Upload CTest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: build/cpp/Testing/**/*
          if-no-files-found: warn

  java-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify with Maven
        run: mvn --batch-mode --errors --show-version verify

      - name: Upload jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-jars
          path: java-services/*/target/*.jar
          if-no-files-found: warn

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: java-services/*/target/surefire-reports/*
          if-no-files-found: warn
