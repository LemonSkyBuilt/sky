name: CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  java-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify with Maven
        run: mvn --batch-mode --errors --show-version verify

      - name: Upload jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-jars
          path: java-services/*/target/*.jar
          if-no-files-found: warn

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: java-services/*/target/surefire-reports/*
          if-no-files-found: warn
