workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - verify

default:
  image: maven:3.9.9-eclipse-temurin-21
  interruptible: true

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --show-version"

cache:
  key:
    files:
      - pom.xml
      - java-services/pom.xml
  paths:
    - .m2/repository

java-verify:
  stage: verify
  script:
    - mvn $MAVEN_CLI_OPTS verify
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - java-services/*/target/*.jar
      - java-services/*/target/surefire-reports/*

cpp-verify:
  stage: verify
  image: ubuntu:24.04
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends build-essential cmake ninja-build
  script:
    - cmake -S cpp-services -B build/cpp -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build/cpp --parallel
    - ctest --test-dir build/cpp --output-on-failure
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/cpp/bin/*
      - build/cpp/Testing/**/*
